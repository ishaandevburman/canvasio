<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canvasio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toolbar">
  <div class="tool-group">
    <button id="tool-brush" class="active" data-tool="brush">Brush</button>
    <button id="tool-eraser" data-tool="eraser">Eraser</button>
  </div>
  <div class="tool-group">
    <label>
      <input type="color" id="color-picker" value="#000000">
    </label>
  </div>
  <div class="tool-group">
    <label>
      Size
      <input type="range" id="size-slider" min="1" max="50" value="3">
      <span id="size-label">3</span>
    </label>
  </div>
  <button id="clear-btn">Clear</button>
  <span id="status" class="disconnected">Disconnected</span>
</div>
<canvas id="canvas"></canvas>
<script src="script.js"></script>
</body>
</html>
