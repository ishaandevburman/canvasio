<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canvasio</title>
<link rel="stylesheet" href="/static/style.css?v=9">
</head>
<body>
<div id="join-modal">
  <div id="join-card">
    <h1>canvasio</h1>
    <p id="join-room-label"></p>
    <input type="text" id="join-name-input" placeholder="Your name" maxlength="24" autofocus>
    <button id="join-btn">Join</button>
  </div>
</div>
<div id="app" style="display:none">
  <div id="toolbar">
    <div class="tool-group">
      <button id="tool-brush" class="active" data-tool="brush">Brush</button>
      <button id="tool-eraser" data-tool="eraser">Eraser</button>
      <button id="tool-rect" data-tool="rect">Rect</button>
      <button id="tool-circle" data-tool="circle">Circle</button>
      <button id="tool-line" data-tool="line">Line</button>
    </div>
    <div class="tool-group">
      <label>
        <input type="color" id="color-picker" value="#000000">
      </label>
    </div>
    <div class="tool-group">
      <label>
        Size
        <input type="range" id="size-slider" min="1" max="50" value="3">
        <input type="number" id="size-input" min="1" value="3">
      </label>
    </div>
    <button id="clear-btn">Clear</button>
    <button id="undo-btn">Undo</button>
    <span id="room-label"></span>
    <span id="name-display"></span>
    <span id="status" class="disconnected">Disconnected</span>
  </div>
  <canvas id="canvas"></canvas>
  <div id="user-list"></div>
</div>
<div id="clear-modal">
  <div id="clear-card">
    <p>Clear the board for everyone?</p>
    <div id="clear-actions">
      <button id="clear-cancel">Cancel</button>
      <button id="clear-confirm">Clear</button>
    </div>
  </div>
</div>
<script src="/static/script.js?v=9"></script>
</body>
</html>
