<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canvasio</title>
<link rel="stylesheet" href="/static/style.css?v=13">
</head>
<body>
<div id="join-modal">
  <div id="join-card">
    <h1>canvasio</h1>
    <p id="join-room-label"></p>
    <input type="text" id="join-name-input" placeholder="Your name" maxlength="24" autofocus>
    <button id="join-btn">Join</button>
  </div>
</div>
<div id="app" style="display:none">
  <div id="toolbar">
    <div class="tool-group">
      <button id="tool-brush" class="active" data-tool="brush" title="Brush"><svg width="16" height="16" viewBox="0 0 640 640" fill="currentColor"><path d="M512.5 74.3L291.1 222C262 241.4 243.5 272.9 240.5 307.3C302.8 320.1 351.9 369.2 364.8 431.6C399.3 428.6 430.7 410.1 450.1 381L597.7 159.5C604.4 149.4 608 137.6 608 125.4C608 91.5 580.5 64 546.6 64C534.5 64 522.6 67.6 512.5 74.3zM320 464C320 402.1 269.9 352 208 352C146.1 352 96 402.1 96 464C96 467.9 96.2 471.8 96.6 475.6C98.4 493.1 86.4 512 68.8 512L64 512C46.3 512 32 526.3 32 544C32 561.7 46.3 576 64 576L208 576C269.9 576 320 525.9 320 464z"/></svg></button>
      <button id="tool-eraser" data-tool="eraser" title="Eraser"><svg width="16" height="16" viewBox="0 0 640 640" fill="currentColor"><path d="M210.5 480L333.5 480L398.8 414.7L225.3 241.2L98.6 367.9L210.6 479.9zM256 544L210.5 544C193.5 544 177.2 537.3 165.2 525.3L49 409C38.1 398.1 32 383.4 32 368C32 352.6 38.1 337.9 49 327L295 81C305.9 70.1 320.6 64 336 64C351.4 64 366.1 70.1 377 81L559 263C569.9 273.9 576 288.6 576 304C576 319.4 569.9 334.1 559 345L424 480L544 480C561.7 480 576 494.3 576 512C576 529.7 561.7 544 544 544L256 544z"/></svg></button>
      <button id="tool-rect" data-tool="rect" title="Rectangle"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"/></svg></button>
      <button id="tool-circle" data-tool="circle" title="Circle"><svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="2"/></svg></button>
      <button id="tool-line" data-tool="line" title="Line"><svg width="16" height="16" viewBox="0 0 16 16"><line x1="2" y1="14" x2="14" y2="2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>
    <div class="tool-group">
      <label>
        <input type="color" id="color-picker" value="#000000" title="Color">
      </label>
    </div>
    <div class="tool-group">
      <label>
        Size
        <input type="range" id="size-slider" min="1" max="50" value="3">
        <input type="number" id="size-input" min="1" value="3">
      </label>
    </div>
    <button id="undo-btn" title="Undo"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3L2 7l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 7h7a4 4 0 1 1 0 8H7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
    <button id="clear-btn" title="Clear"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 4h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M5 4V2h6v2" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><rect x="4" y="4" width="8" height="10" stroke="currentColor" stroke-width="1.8" rx="1"/></svg></button>
    <span id="room-label"></span>
    <span id="name-display"></span>
    <span id="status" class="disconnected">Disconnected</span>
  </div>
  <canvas id="canvas"></canvas>
  <div id="user-list"></div>
</div>
<div id="clear-modal">
  <div id="clear-card">
    <p>Clear the board for everyone?</p>
    <div id="clear-actions">
      <button id="clear-cancel">Cancel</button>
      <button id="clear-confirm">Clear</button>
    </div>
  </div>
</div>
<script src="/static/script.js?v=13"></script>
</body>
</html>
